<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGS - Sri Muang Wittayakarn</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #1a1a1a; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px 0;
        }

        /* จำลองหน้ากระดาษ/หน้าจอแอปแบบในรูปที่ 2 */
        #sgs-report {
            width: 390px;
            background-color: #ffffff;
            color: #5d5d5d;
            position: relative;
            padding-bottom: 30px;
        }

        /* หัวตารางเลือกเทอม */
        .term-selector {
            background-color: #f2f2f2;
            margin: 15px;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e0e0e0;
        }

        /* ตารางวิชา */
        .grade-table { width: 100%; border-collapse: collapse; }
        .grade-table th {
            color: #9e9e7e; /* สีเขียวขี้ม้าอ่อนๆ แบบในรูป */
            font-size: 13px;
            font-weight: 500;
            padding: 8px 10px;
            text-align: left;
            border-bottom: 1px solid #eeeeee;
        }
        .grade-table td {
            padding: 12px 10px;
            font-size: 13.5px;
            border-bottom: 1px solid #f9f9f9;
        }

        /* ช่องกรอกเกรดแบบเนียนๆ */
        .grade-select {
            appearance: none;
            background: #fff9e6;
            color: #333;
            font-weight: bold;
            width: 35px;
            text-align: center;
            border: none;
            outline: none;
            cursor: pointer;
        }

        /* ตารางสรุปด้านล่าง */
        .summary-container { padding: 0 15px; margin-top: 15px; }
        .summary-table { width: 100%; font-size: 11.5px; margin-bottom: 15px; border-top: 1px solid #eee; }
        .summary-table th { background: transparent; color: #999; padding: 10px 2px; font-weight: 400; text-align: center; border-bottom: 1px solid #eee; }
        .summary-table td { text-align: center; padding: 8px 2px; border-bottom: 1px solid #f5f5f5; color: #666; }

        .gpa-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-top: 1px solid #eee; }
        .gpa-val { font-size: 24px; font-weight: bold; color: #444; }
        
        .rank-info { display: flex; justify-content: space-between; font-size: 12px; padding: 5px 0; color: #888; border-top: 1px solid #f9f9f9; }
        .rank-val { font-weight: bold; color: #555; }

        .btn-capture {
            margin-top: 20px;
            background: #eab308;
            color: white;
            padding: 10px 25px;
            border-radius: 5px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="sgs-report">
        <div class="term-selector">
            <span>ปีที่ 1 ภาคเรียนที่ 2</span>
            <span style="font-size: 10px;">⇅</span>
        </div>

        <table class="grade-table">
            <thead>
                <tr>
                    <th style="width: 20%;">รหัสวิชา</th>
                    <th style="width: 55%;">รายวิชา</th>
                    <th style="width: 12%; text-align: center;">นก.</th>
                    <th style="width: 13%; text-align: center;">เกรด</th>
                </tr>
            </thead>
            <tbody id="subject-list">
                </tbody>
        </table>

        <div class="summary-container">
            <table class="summary-table">
                <thead>
                    <tr>
                        <th style="text-align: left;">ประเภทวิชา</th>
                        <th>ที่เรียน/ที่ได้</th>
                        <th>เฉลี่ย</th>
                        <th>สะสม</th>
                        <th>เฉลี่ยสะสม</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="text-align: left;">พื้นฐาน</td>
                        <td id="base-cr-sum">10.0/10.0</td>
                        <td id="base-gpa-sum" style="font-weight: bold;">4.00</td>
                        <td>44.0/44.0</td>
                        <td>3.99</td>
                    </tr>
                    <tr>
                        <td style="text-align: left;">เพิ่มเติม</td>
                        <td id="add-cr-sum">6.0/6.0</td>
                        <td id="add-gpa-sum" style="font-weight: bold;">4.00</td>
                        <td>19.0/19.0</td>
                        <td>3.94</td>
                    </tr>
                    <tr style="color: #999;">
                        <td style="text-align: left;">กิจกรรม(ชม.)</td>
                        <td>60/60</td>
                        <td>-</td>
                        <td>224/224</td>
                        <td>-</td>
                    </tr>
                </tbody>
            </table>

            <div class="gpa-row">
                <span style="color: #bbb; font-size: 13px; font-weight: bold;">GPA</span>
                <span class="gpa-val" id="total-gpa">4.00</span>
            </div>
            
            <div class="rank-info">
                <span>อันดับที่/ห้อง</span>
                <span class="rank-val">1/40</span>
            </div>
            <div class="rank-info">
                <span>อันดับที่/ระดับ</span>
                <span class="rank-val">12/350</span>
            </div>
        </div>

        <div style="height: 20px;"></div>
    </div>

    <button class="btn-capture" onclick="takeShot()">Save as Image</button>

    <script>
        // ข้อมูลจากภาพตารางเรียน ม.1/6 (ภาพที่ 1)
        const subjects = [
            { id: 'ท21102', name: 'ภาษาไทย 2', cr: 1.5, type: 'base' },
            { id: 'ค21102', name: 'คณิตศาสตร์พื้นฐาน 2', cr: 1.5, type: 'base' },
            { id: 'ว21102', name: 'วิทยาศาสตร์ 2', cr: 1.5, type: 'base' },
            { id: 'ส21103', name: 'สังคมศึกษา 2', cr: 1.0, type: 'base' },
            { id: 'ส21104', name: 'ประวัติศาสตร์ 2', cr: 0.5, type: 'base' },
            { id: 'พ21103', name: 'สุขศึกษา 2', cr: 0.5, type: 'base' },
            { id: 'พ21104', name: 'พลศึกษา 2', cr: 0.5, type: 'base' },
            { id: 'ศ21103', name: 'ศิลปะ 2 (ทัศนศิลป์)', cr: 0.5, type: 'base' },
            { id: 'ศ21104', name: 'นาฏศิลป์ 2', cr: 0.5, type: 'base' },
            { id: 'อ21102', name: 'ภาษาอังกฤษพื้นฐาน 2', cr: 1.5, type: 'base' },
            { id: 'ง21102', name: 'การงานอาชีพ 2', cr: 0.5, type: 'base' },
            { id: 'ค20212', name: 'คณิตศาสตร์เพิ่มเติม 2', cr: 1.0, type: 'add' },
            { id: 'อ20202', name: 'ภาษาอังกฤษเพิ่มเติม 2', cr: 1.0, type: 'add' },
            { id: 'EN20222', name: 'Intensive English 2', cr: 1.0, type: 'add' },
            { id: 'ง20271', name: 'คหกรรม 1', cr: 1.0, type: 'add' },
            { id: 'ก20272', name: 'คอมพิวเตอร์เพิ่มเติม', cr: 0.5, type: 'add' },
            { id: 'ก21920', name: 'วิชาเพิ่มเติมพิเศษ', cr: 0.5, type: 'add' }
        ];

        subjects.forEach(s => s.grade = 4.0);

        function updateUI() {
            const list = document.getElementById('subject-list');
            list.innerHTML = '';
            let bCr = 0, bPt = 0, aCr = 0, aPt = 0;

            subjects.forEach((s, i) => {
                if(s.type === 'base') { bCr += s.cr; bPt += (s.cr * s.grade); }
                else { aCr += s.cr; aPt += (s.cr * s.grade); }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color: #999; font-size: 11px;">${s.id}</td>
                    <td>${s.name}</td>
                    <td style="text-align: center; color: #999;">${s.cr.toFixed(1)}</td>
                    <td style="text-align: center;">
                        <select class="grade-select" onchange="changeGrade(${i}, this.value)">
                            <option value="4" ${s.grade==4?'selected':''}>4</option>
                            <option value="3.5" ${s.grade==3.5?'selected':''}>3.5</option>
                            <option value="3" ${s.grade==3?'selected':''}>3</option>
                            <option value="2.5" ${s.grade==2.5?'selected':''}>2.5</option>
                            <option value="2" ${s.grade==2?'selected':''}>2</option>
                            <option value="1.5" ${s.grade==1.5?'selected':''}>1.5</option>
                            <option value="1" ${s.grade==1?'selected':''}>1</option>
                            <option value="0" ${s.grade==0?'selected':''}>0</option>
                        </select>
                    </td>
                `;
                list.appendChild(tr);
            });

            document.getElementById('base-cr-sum').innerText = `${bCr.toFixed(1)}/${bCr.toFixed(1)}`;
            document.getElementById('base-gpa-sum').innerText = (bPt/bCr).toFixed(2);
            document.getElementById('add-cr-sum').innerText = `${aCr.toFixed(1)}/${aCr.toFixed(1)}`;
            document.getElementById('add-gpa-sum').innerText = (aPt/aCr).toFixed(2);
            document.getElementById('total-gpa').innerText = ((bPt+aPt)/(bCr+aCr)).toFixed(2);
        }

        function changeGrade(i, v) { subjects[i].grade = parseFloat(v); updateUI(); }

        async function takeShot() {
            const area = document.getElementById('sgs-report');
            
            // เปลี่ยน Select เป็น Text เพื่อความเนียน 100%
            const selects = area.querySelectorAll('select');
            const backups = [];
            selects.forEach(s => {
                const val = s.value;
                const span = document.createElement('span');
                span.innerText = val;
                span.style.fontWeight = "bold";
                backups.push({s, span, parent: s.parentNode});
                s.style.display = 'none';
                s.parentNode.appendChild(span);
            });

            const canvas = await html2canvas(area, { scale: 3 });
            const link = document.createElement('a');
            link.download = 'SGS_Final_Grade.png';
            link.href = canvas.toDataURL();
            link.click();

            backups.forEach(b => { b.span.remove(); b.s.style.display = 'inline-block'; });
        }

        updateUI();
    </script>
</body>
</html>
