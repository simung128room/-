<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGS Grade Simulation - Sri Muang Wittayakarn</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f0f2f5; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #report-card {
            width: 390px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            color: #444;
        }

        .header-section {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .dropdown-box {
            background: #f5f5f5;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #666;
            margin-bottom: 15px;
        }

        table { width: 100%; border-collapse: collapse; }
        th { 
            text-align: left; 
            font-size: 13px; 
            color: #888; 
            font-weight: 500; 
            padding: 8px 5px;
            border-bottom: 1px solid #f0f0f0;
        }
        td { padding: 10px 5px; border-bottom: 1px solid #f9f9f9; font-size: 13px; }

        .grade-pill {
            background: #fdf5e6;
            color: #b8860b;
            font-weight: bold;
            border-radius: 4px;
            padding: 2px 8px;
            border: none;
            width: 45px;
            text-align: center;
            cursor: pointer;
        }

        .summary-table th { background: transparent; color: #777; font-size: 11px; text-align: center; }
        .summary-table td { text-align: center; font-size: 12px; padding: 5px; }

        .btn-save {
            margin-top: 20px;
            background: #2d3436;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-save:hover { transform: scale(1.05); background: #000; }
    </style>
</head>
<body>

    <div id="report-card">
        <div class="px-4 py-2 flex justify-between items-center text-[12px] font-bold">
          <div class="header-section">
            <div class="dropdown-box">
                <span>ม.1 ภาคเรียนที่ 2 (2568)</span>
                <span>⇅</span>
            </div>

            <table>
                <thead>
                    <tr>
                        <th width="20%">รหัสวิชา</th>
                        <th width="50%">รายวิชา</th>
                        <th width="15%" class="text-center">นก.</th>
                        <th width="15%" class="text-center">เกรด</th>
                    </tr>
                </thead>
                <tbody id="subject-list">
                    </tbody>
            </table>
        </div>

        <div class="p-4 bg-white">
            <table class="summary-table mb-4">
                <thead>
                    <tr class="border-b">
                        <th class="text-left">ประเภทวิชา</th>
                        <th>ที่เรียน/ที่ได้</th>
                        <th>เฉลี่ย</th>
                        <th>สะสม</th>
                        <th>เฉลี่ยสะสม</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="text-left font-medium">พื้นฐาน</td>
                        <td id="base-cr">10.0/10.0</td>
                        <td id="base-gpa">4.00</td>
                        <td>44.0/44.0</td>
                        <td>3.99</td>
                    </tr>
                    <tr class="text-slate-400">
                        <td class="text-left font-medium">เพิ่มเติม</td>
                        <td id="add-cr">6.0/6.0</td>
                        <td id="add-gpa">4.00</td>
                        <td>19.0/19.0</td>
                        <td>3.94</td>
                    </tr>
                </tbody>
            </table>

            <div class="border-t pt-3 flex flex-col gap-2">
                <div class="flex justify-between items-center">
                    <span class="text-gray-400 text-sm">GPA</span>
                    <span class="text-2xl font-black" id="total-gpa">4.00</span>
                </div>
                <div class="flex justify-between text-sm border-t border-gray-50 pt-2">
                    <span class="text-gray-400">อันดับที่/ห้อง</span>
                    <span class="font-bold">1 / 40</span>
                </div>
                <div class="flex justify-between text-sm border-t border-gray-50 pt-2">
                    <span class="text-gray-400">อันดับที่/ระดับ</span>
                    <span class="font-bold">12 / 350</span>
                </div>
            </div>
        </div>

        <div class="bg-gray-50 py-3 text-center text-[10px] text-gray-300 font-bold uppercase tracking-widest">
            โรงเรียนศรีเมืองวิทยาคาร
        </div>
    </div>

    <button class="btn-save" onclick="downloadImage()">Download PNG Report</button>
    <p class="text-[11px] text-gray-400 mt-3">*สามารถคลิกที่ตัวเลขเกรดเพื่อแก้ไขได้*</p>

    <script>
        // ข้อมูลอ้างอิงจากตารางเรียน (ภาพที่ 1)
        const subjects = [
            { id: 'ท21102', name: 'ภาษาไทย', cr: 1.5, type: 'base' },
            { id: 'ค21102', name: 'คณิตศาสตร์พื้นฐาน', cr: 1.5, type: 'base' },
            { id: 'ว21102', name: 'วิทยาศาสตร์', cr: 1.5, type: 'base' },
            { id: 'ส21103', name: 'สังคมศึกษา', cr: 1.0, type: 'base' },
            { id: 'ส21104', name: 'ประวัติศาสตร์', cr: 0.5, type: 'base' },
            { id: 'พ21103', name: 'สุขศึกษา', cr: 0.5, type: 'base' },
            { id: 'พ21104', name: 'พลศึกษา', cr: 0.5, type: 'base' },
            { id: 'ศ21103', name: 'ศิลปะ (ทัศนศิลป์)', cr: 0.5, type: 'base' },
            { id: 'ศ21104', name: 'นาฏศิลป์', cr: 0.5, type: 'base' },
            { id: 'อ21102', name: 'ภาษาอังกฤษพื้นฐาน', cr: 1.5, type: 'base' },
            { id: 'ง21102', name: 'การงานอาชีพ', cr: 0.5, type: 'base' },
            { id: 'ค20212', name: 'คณิตศาสตร์เพิ่มเติม', cr: 1.0, type: 'add' },
            { id: 'อ20202', name: 'ภาษาอังกฤษเพิ่มเติม', cr: 1.0, type: 'add' },
            { id: 'EN20222', name: 'Intensive English', cr: 1.0, type: 'add' },
            { id: 'ง20271', name: 'คหกรรม', cr: 1.0, type: 'add' },
            { id: 'ก20272', name: 'คอมพิวเตอร์เพิ่มเติม', cr: 0.5, type: 'add' },
            { id: 'ก21920', name: 'วิชาเพิ่มเติมอื่นๆ', cr: 0.5, type: 'add' }
        ];

        // ตั้งค่าเกรดเริ่มต้นเป็น 4.0 ทุกวิชา
        subjects.forEach(s => s.grade = 4.0);

        function calculate() {
            const list = document.getElementById('subject-list');
            list.innerHTML = '';
            
            let baseCrTotal = 0, basePt = 0;
            let addCrTotal = 0, addPt = 0;

            subjects.forEach((s, i) => {
                if(s.type === 'base') { baseCrTotal += s.cr; basePt += (s.cr * s.grade); }
                else { addCrTotal += s.cr; addPt += (s.cr * s.grade); }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="text-gray-400 font-mono text-[11px]">${s.id}</td>
                    <td class="font-medium">${s.name}</td>
                    <td class="text-center text-gray-400">${s.cr.toFixed(1)}</td>
                    <td class="text-center">
                        <select class="grade-pill" onchange="updateGrade(${i}, this.value)">
                            <option value="4" ${s.grade==4?'selected':''}>4.0</option>
                            <option value="3.5" ${s.grade==3.5?'selected':''}>3.5</option>
                            <option value="3" ${s.grade==3?'selected':''}>3.0</option>
                            <option value="2.5" ${s.grade==2.5?'selected':''}>2.5</option>
                            <option value="2" ${s.grade==2?'selected':''}>2.0</option>
                            <option value="1.5" ${s.grade==1.5?'selected':''}>1.5</option>
                            <option value="1" ${s.grade==1?'selected':''}>1.0</option>
                            <option value="0" ${s.grade==0?'selected':''}>0.0</option>
                        </select>
                    </td>
                `;
                list.appendChild(tr);
            });

            const bGPA = (basePt / baseCrTotal).toFixed(2);
            const aGPA = (addPt / addCrTotal).toFixed(2);
            const totalGPA = ((basePt + addPt) / (baseCrTotal + addCrTotal)).toFixed(2);

            document.getElementById('base-cr').innerText = `${baseCrTotal.toFixed(1)}/${baseCrTotal.toFixed(1)}`;
            document.getElementById('base-gpa').innerText = bGPA;
            document.getElementById('add-cr').innerText = `${addCrTotal.toFixed(1)}/${addCrTotal.toFixed(1)}`;
            document.getElementById('add-gpa').innerText = aGPA;
            document.getElementById('total-gpa').innerText = totalGPA;
        }

        function updateGrade(i, val) {
            subjects[i].grade = parseFloat(val);
            calculate();
        }

        async function downloadImage() {
            const report = document.getElementById('report-card');
            
            // เปลี่ยน Select ให้เป็น Text ก่อนถ่ายรูปเพื่อความสมจริง
            const selects = report.querySelectorAll('select');
            const originalValues = [];
            selects.forEach(s => {
                originalValues.push({el: s, val: s.value, parent: s.parentNode});
                const span = document.createElement('span');
                span.innerText = parseFloat(s.value).toFixed(1);
                span.className = 'font-bold text-amber-600';
                s.style.display = 'none';
                s.parentNode.appendChild(span);
            });

            const canvas = await html2canvas(report, { scale: 3 });
            const link = document.createElement('a');
            link.download = 'My_Grade_Report.png';
            link.href = canvas.toDataURL();
            link.click();

            // คืนค่า Select กลับมา
            report.querySelectorAll('span.font-bold.text-amber-600').forEach(sp => sp.remove());
            selects.forEach(s => s.style.display = 'inline-block');
        }

        calculate();
    </script>
</body>
</html>
