<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGS - Sri Muang Wittayakarn</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f0f0f0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px 0;
        }

        /* กล่องหลักถอดแบบจากภาพที่ 2 */
        #sgs-main {
            width: 390px;
            background-color: #ffffff;
            color: #4b5563;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .dropdown-area {
            background-color: #f3f4f6;
            margin: 15px;
            padding: 10px 12px;
            border-radius: 4px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            color: #374151;
            border: 0.5px solid #e5e7eb;
        }

        table { width: 100%; border-collapse: collapse; }
        th { 
            color: #a3a3a3; 
            font-size: 12px; 
            font-weight: 500; 
            padding: 10px 12px; 
            text-align: left; 
            border-bottom: 0.5px solid #f3f4f6;
        }
        td { padding: 12px; font-size: 14px; border-bottom: 0.5px solid #f9fafb; color: #1f2937; }

        .grade-input-box {
            background: #fff;
            color: #111827;
            font-weight: 700;
            width: 40px;
            text-align: center;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            outline: none;
        }

        /* ส่วนสรุปผลเลียนแบบเป๊ะๆ */
        .summary-wrapper { padding: 15px; background: #fff; }
        .stat-table { width: 100%; font-size: 12px; color: #6b7280; border-top: 0.5px solid #eee; }
        .stat-table th { background: transparent; color: #9ca3af; padding: 8px 2px; font-weight: 400; text-align: center; }
        .stat-table td { text-align: center; padding: 8px 2px; color: #4b5563; }

        .gpa-section { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-top: 1px solid #f3f4f6; }
        .gpa-label { color: #9ca3af; font-size: 12px; font-weight: 700; letter-spacing: 0.05em; }
        .gpa-value { font-size: 28px; font-weight: 800; color: #111827; }
        
        .rank-box { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; color: #9ca3af; }
        .rank-bold { font-weight: 700; color: #374151; }

        .btn-save {
            margin-top: 25px;
            background: #374151;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="sgs-main">
        <div class="dropdown-area">
            <span>ปีที่ 1 ภาคเรียนที่ 2 (2568)</span>
            <span>⇅</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 22%">รหัสวิชา</th>
                    <th style="width: 50%">รายวิชา</th>
                    <th style="width: 13%" class="text-center">นก.</th>
                    <th style="width: 15%" class="text-center">เกรด</th>
                </tr>
            </thead>
            <tbody id="grade-body">
                </tbody>
        </table>

        <div class="summary-wrapper">
            <table class="stat-table">
                <thead>
                    <tr>
                        <th class="text-left">ประเภทวิชา</th>
                        <th>ที่เรียน/ได้</th>
                        <th>เฉลี่ย</th>
                        <th>สะสม</th>
                        <th>เฉลี่ยสะสม</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="text-left font-bold">พื้นฐาน</td>
                        <td id="base-cr-display">10.0/10.0</td>
                        <td id="base-gpa-display" class="font-bold">4.00</td>
                        <td>44.0/44.0</td>
                        <td>3.99</td>
                    </tr>
                    <tr>
                        <td class="text-left font-bold">เพิ่มเติม</td>
                        <td id="add-cr-display">6.0/6.0</td>
                        <td id="add-gpa-display" class="font-bold">4.00</td>
                        <td>19.0/19.0</td>
                        <td>3.94</td>
                    </tr>
                </tbody>
            </table>

            <div class="gpa-section mt-4">
                <span class="gpa-label">GPA</span>
                <span class="gpa-value" id="final-gpa-display">4.00</span>
            </div>

            <div class="rank-box border-t border-gray-50 pt-2">
                <span>อันดับที่/ห้อง</span>
                <span class="rank-bold">1 / 40</span>
            </div>
            <div class="rank-box">
                <span>อันดับที่/ระดับ</span>
                <span class="rank-bold">12 / 350</span>
            </div>
        </div>

        <div class="py-4 text-center text-[10px] text-gray-300 font-bold uppercase tracking-widest">
            โรงเรียนศรีเมืองวิทยาคาร
        </div>
    </div>

    <button class="btn-save" onclick="generateImage()">บันทึกรูปภาพ</button>

    <script>
        // รายวิชาจริงจากตารางเรียน
        const data = [
            { id: 'ท21102', name: 'ภาษาไทย', cr: 1.5, type: 'base' },
            { id: 'ค21102', name: 'คณิตศาสตร์พื้นฐาน', cr: 1.5, type: 'base' },
            { id: 'ว21102', name: 'วิทยาศาสตร์', cr: 1.5, type: 'base' },
            { id: 'ส21103', name: 'สังคมศึกษา', cr: 1.0, type: 'base' },
            { id: 'ส21104', name: 'ประวัติศาสตร์', cr: 0.5, type: 'base' },
            { id: 'พ21103', name: 'สุขศึกษา', cr: 0.5, type: 'base' },
            { id: 'พ21104', name: 'พลศึกษา', cr: 0.5, type: 'base' },
            { id: 'ศ21103', name: 'ศิลปะ', cr: 0.5, type: 'base' },
            { id: 'ศ21104', name: 'นาฏศิลป์', cr: 0.5, type: 'base' },
            { id: 'อ21102', name: 'ภาษาอังกฤษพื้นฐาน', cr: 1.5, type: 'base' },
            { id: 'ง21102', name: 'การงานอาชีพ', cr: 0.5, type: 'base' },
            { id: 'ค20212', name: 'คณิตเพิ่มเติม', cr: 1.0, type: 'add' },
            { id: 'อ20202', name: 'อังกฤษเพิ่มเติม', cr: 1.0, type: 'add' },
            { id: 'EN20222', name: 'Intensive English', cr: 1.0, type: 'add' },
            { id: 'ง20271', name: 'คหกรรม', cr: 1.0, type: 'add' },
            { id: 'ก20272', name: 'คอมพิวเตอร์เพิ่มเติม', cr: 0.5, type: 'add' },
            { id: 'ก21920', name: 'วิชาเพิ่มเติมพิเศษ', cr: 0.5, type: 'add' }
        ];

        data.forEach(d => d.grade = 4.0);

        function render() {
            const body = document.getElementById('grade-body');
            body.innerHTML = '';
            let bCr = 0, bPt = 0, aCr = 0, aPt = 0;

            data.forEach((d, i) => {
                if(d.type === 'base') { bCr += d.cr; bPt += (d.cr * d.grade); }
                else { aCr += d.cr; aPt += (d.cr * d.grade); }

                const row = `<tr>
                    <td class="text-gray-400 font-mono text-[11px]">${d.id}</td>
                    <td class="font-medium">${d.name}</td>
                    <td class="text-center text-gray-400">${d.cr.toFixed(1)}</td>
                    <td class="text-center">
                        <select class="grade-input-box" onchange="setGrade(${i}, this.value)">
                            <option value="4" ${d.grade==4?'selected':''}>4</option>
                            <option value="3.5" ${d.grade==3.5?'selected':''}>3.5</option>
                            <option value="3" ${d.grade==3?'selected':''}>3</option>
                            <option value="2.5" ${d.grade==2.5?'selected':''}>2.5</option>
                            <option value="2" ${d.grade==2?'selected':''}>2</option>
                            <option value="1.5" ${d.grade==1.5?'selected':''}>1.5</option>
                            <option value="1" ${d.grade==1?'selected':''}>1</option>
                            <option value="0" ${d.grade==0?'selected':''}>0</option>
                        </select>
                    </td>
                </tr>`;
                body.innerHTML += row;
            });

            document.getElementById('base-cr-display').innerText = `${bCr.toFixed(1)}/${bCr.toFixed(1)}`;
            document.getElementById('base-gpa-display').innerText = (bPt/bCr).toFixed(2);
            document.getElementById('add-cr-display').innerText = `${aCr.toFixed(1)}/${aCr.toFixed(1)}`;
            document.getElementById('add-gpa-display').innerText = (aPt/aCr).toFixed(2);
            document.getElementById('final-gpa-display').innerText = ((bPt+aPt)/(bCr+aCr)).toFixed(2);
        }

        function setGrade(i, v) { data[i].grade = parseFloat(v); render(); }

        async function generateImage() {
            const area = document.getElementById('sgs-main');
            const selects = area.querySelectorAll('select');
            const stores = [];
            
            selects.forEach(s => {
                const span = document.createElement('span');
                span.innerText = s.value;
                span.style.fontWeight = "bold";
                stores.push({s, span, p: s.parentNode});
                s.style.display = 'none';
                s.parentNode.appendChild(span);
            });

            const canvas = await html2canvas(area, { scale: 3 });
            const link = document.createElement('a');
            link.download = 'SGS_Grade.png';
            link.href = canvas.toDataURL();
            link.click();

            stores.forEach(b => { b.span.remove(); b.s.style.display = 'inline-block'; });
        }

        render();
    </script>
</body>
</html>
