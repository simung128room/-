<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Report Pro - ควอนวู Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #0f172a; /* พื้นหลังหน้าเว็บสีเข้มแบบ Deep Sea */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        /* จำลองหน้าจอมือถือ */
        #mobile-canvas {
            background-color: #ffffff;
            width: 100%;
            max-width: 380px;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            color: #1e293b;
            position: relative;
            border: 8px solid #1e293b; /* ขอบมือถือ */
        }

        /* หัวแอป */
        .header-gradient {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 25px 20px;
            color: white;
        }

        /* ตารางวิชา */
        .subject-table { width: 100%; border-collapse: collapse; }
        .subject-table th { 
            font-size: 11px; 
            text-transform: uppercase; 
            color: #64748b; 
            padding: 12px 8px; 
            border-bottom: 2px solid #f1f5f9;
            text-align: left;
        }
        .subject-table td { 
            padding: 10px 8px; 
            border-bottom: 1px solid #f8fafc; 
            font-size: 13.5px; 
        }

        /* ตัวเลือกเกรด */
        .grade-select {
            background-color: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 4px 8px;
            font-weight: 700;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
        }
        .grade-select:hover { background-color: #e2e8f0; border-color: #cbd5e1; }

        /* ส่วนสรุปผล */
        .summary-card {
            background-color: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-top: 15px;
        }

        /* ปุ่มกด */
        .btn-download {
            margin-top: 2rem;
            background: linear-gradient(to right, #6366f1, #a855f7);
            color: white;
            padding: 12px 32px;
            border-radius: 9999px;
            font-weight: 600;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
            transition: all 0.3s;
        }
        .btn-download:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body>

    <div id="mobile-canvas">
        <div class="header-gradient">
            <div class="flex justify-between items-center mb-1">
                <h1 class="text-xl font-bold tracking-tight">รายงานผลการเรียน</h1>
                <span class="bg-green-500 text-[10px] px-2 py-0.5 rounded-full font-bold uppercase">Active</span>
            </div>
            <p class="text-slate-400 text-xs">โรงเรียนศรีเมืองวิทยาคาร</p>
        </div>

        <div class="p-5">
            <div class="flex items-center gap-3 mb-6 bg-slate-100 p-2 rounded-2xl">
                <div class="bg-white p-2 rounded-xl shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>
                <div>
                    <p class="text-[10px] text-slate-500 font-bold uppercase leading-none">Semester</p>
                    <p class="text-sm font-bold text-slate-700">ปีการศึกษา 2568 | ภาคเรียนที่ 2</p>
                </div>
            </div>

            <div class="overflow-hidden">
                <table class="subject-table">
                    <thead>
                        <tr>
                            <th style="width: 25%">รหัส</th>
                            <th style="width: 45%">วิชา</th>
                            <th style="text-align: center;">นก.</th>
                            <th style="text-align: center;">เกรด</th>
                        </tr>
                    </thead>
                    <tbody id="grade-list">
                        </tbody>
                </table>
            </div>

            <div class="summary-card">
                <div class="flex justify-between items-end mb-4">
                    <div>
                        <p class="text-xs text-slate-400 font-bold uppercase">Grade Point Average</p>
                        <p class="text-4xl font-black text-slate-800" id="gpa-display">0.00</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-slate-400 font-bold uppercase">Credit Earned</p>
                        <p class="text-lg font-bold text-slate-700" id="total-credit">0.0</p>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-3 pt-4 border-t border-slate-200">
                    <div class="bg-white p-3 rounded-xl border border-slate-100">
                        <p class="text-[9px] text-slate-400 font-bold uppercase">อันดับในห้อง</p>
                        <p class="text-sm font-bold text-indigo-600">01 / 40</p>
                    </div>
                    <div class="bg-white p-3 rounded-xl border border-slate-100">
                        <p class="text-[9px] text-slate-400 font-bold uppercase">อันดับในรุ่น</p>
                        <p class="text-sm font-bold text-purple-600">12 / 350</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-slate-50 py-4 text-center">
            <p class="text-[9px] text-slate-400 font-bold tracking-[0.2em] uppercase">
                Generated by Kwon-Woo / M.6 Student
            </p>
        </div>
    </div>

    <button class="btn-download flex items-center gap-2" onclick="saveAsImage()">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
        </svg>
        Save as PNG
    </button>
    
    <p class="text-slate-500 text-xs mt-4">แตะที่เกรดในตารางเพื่อแก้ไขข้อมูล</p>

    <script>
        // ข้อมูลตั้งต้นที่ดึงจากตารางเรียน
        let subjects = [
            { id: 'ท21102', name: 'ภาษาไทย', credit: 1.5, grade: 4.0 },
            { id: 'ค21102', name: 'คณิตศาสตร์', credit: 1.5, grade: 3.5 },
            { id: 'ว21102', name: 'วิทยาศาสตร์', credit: 1.5, grade: 4.0 },
            { id: 'ส21103', name: 'สังคมศึกษา', credit: 1.0, grade: 4.0 },
            { id: 'ส21104', name: 'ประวัติศาสตร์', credit: 0.5, grade: 3.5 },
            { id: 'พ21103', name: 'สุขศึกษา', credit: 0.5, grade: 4.0 },
            { id: 'ศ21103', name: 'ศิลปะ', credit: 1.0, grade: 4.0 },
            { id: 'อ21102', name: 'ภาษาอังกฤษ', credit: 1.5, grade: 4.0 },
            { id: 'ค20212', name: 'คณิตเพิ่มเติม', credit: 1.0, grade: 4.0 },
            { id: 'พ21104', name: 'พลศึกษา', credit: 0.5, grade: 4.0 },
            { id: 'ศ21104', name: 'นาฏศิลป์', credit: 0.5, grade: 4.0 },
            { id: 'อ20202', name: 'อังกฤษเพิ่มเติม', credit: 1.0, grade: 4.0 },
            { id: 'EN20222', name: 'อังกฤษ (EN)', credit: 1.0, grade: 4.0 },
            { id: 'ง21102', name: 'การงานอาชีพ', credit: 0.5, grade: 4.0 },
            { id: 'ง21103', name: 'การงาน (ห้องสมุด)', credit: 0.5, grade: 4.0 },
            { id: 'ง20271', name: 'คหกรรม', credit: 1.0, grade: 4.0 },
            { id: 'ก20272', name: 'วิชาเพิ่มเติม 1', credit: 0.5, grade: 4.0 },
            { id: 'ก21920', name: 'วิชาเพิ่มเติม 2', credit: 0.5, grade: 4.0 }
        ];

        const gradeList = document.getElementById('grade-list');
        const gpaDisplay = document.getElementById('gpa-display');
        const creditDisplay = document.getElementById('total-credit');

        // ฟังก์ชันวาดตาราง
        function renderTable() {
            gradeList.innerHTML = '';
            let totalCr = 0;
            let totalPt = 0;

            subjects.forEach((s, index) => {
                totalCr += s.credit;
                totalPt += (s.credit * s.grade);

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="text-slate-400 font-mono text-[11px]">${s.id}</td>
                    <td class="font-medium text-slate-700">${s.name}</td>
                    <td class="text-center text-slate-400 font-bold">${s.credit.toFixed(1)}</td>
                    <td class="text-center">
                        <select class="grade-select" onchange="updateGrade(${index}, this.value)">
                            <option value="4" ${s.grade == 4 ? 'selected' : ''}>4.0</option>
                            <option value="3.5" ${s.grade == 3.5 ? 'selected' : ''}>3.5</option>
                            <option value="3" ${s.grade == 3 ? 'selected' : ''}>3.0</option>
                            <option value="2.5" ${s.grade == 2.5 ? 'selected' : ''}>2.5</option>
                            <option value="2" ${s.grade == 2 ? 'selected' : ''}>2.0</option>
                            <option value="1.5" ${s.grade == 1.5 ? 'selected' : ''}>1.5</option>
                            <option value="1" ${s.grade == 1 ? 'selected' : ''}>1.0</option>
                            <option value="0" ${s.grade == 0 ? 'selected' : ''}>0.0</option>
                        </select>
                    </td>
                `;
                gradeList.appendChild(tr);
            });

            gpaDisplay.innerText = (totalPt / totalCr).toFixed(2);
            creditDisplay.innerText = totalCr.toFixed(1);
        }

        function updateGrade(idx, val) {
            subjects[idx].grade = parseFloat(val);
            renderTable();
        }

        // ฟังก์ชันดาวน์โหลดรูป (จัดการเรื่องความสวยงามก่อนถ่าย)
        async function saveAsImage() {
            const originalElement = document.getElementById('mobile-canvas');
            
            // สร้าง Clone เพื่อไม่ให้กระทบหน้าจอที่ผู้ใช้กำลังดู
            const clone = originalElement.cloneNode(true);
            clone.style.position = 'fixed';
            clone.style.left = '-9999px';
            clone.style.top = '0';
            clone.style.border = 'none'; // ในรูปไม่ต้องมีขอบมือถือดำๆ
            document.body.appendChild(clone);

            // เปลี่ยน <select> ให้เป็นข้อความสวยๆ เพื่อให้รูปออกมาดูโปรเฟสชันนอล
            const selects = clone.querySelectorAll('.grade-select');
            selects.forEach((sel, i) => {
                const val = subjects[i].grade.toFixed(1);
                const parent = sel.parentNode;
                parent.innerHTML = `<span style="font-weight: 800; color: #4f46e5;">${val}</span>`;
            });

            try {
                const canvas = await html2canvas(clone, {
                    scale: 3, // ความชัดระดับ 4K
                    useCORS: true,
                    backgroundColor: null,
                    borderRadius: 40
                });

                const link = document.createElement('a');
                link.download = `GPA_Report_2026.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) {
                alert("ขออภัย! ไม่สามารถสร้างรูปภาพได้ในขณะนี้");
                console.error(err);
            } finally {
                document.body.removeChild(clone);
            }
        }

        // เริ่มต้นทำงาน
        renderTable();
    </script>
</body>
</html>
